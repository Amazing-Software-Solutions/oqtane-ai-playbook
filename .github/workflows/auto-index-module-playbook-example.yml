name: Auto Generate Index (Module Playbook Example)

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'module-playbook-example/**'
  pull_request:
    branches:
      - main
    paths:
      - 'module-playbook-example/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate index.md
      run: |
        cd module-playbook-example

        cat > index.md << 'EOF'
# Module Playbook Example - Index (Auto-generated)

> This file is automatically generated by GitHub Actions. Do not edit manually.

---

## Overview

The **Module Playbook Example** demonstrates how to apply the Oqtane AI Playbook governance patterns in a real module.

## Contents
EOF

        # Helper function to extract a clean title from a markdown file's first line
        extract_title() {
          local file="$1"
          local title
          title=$(head -n 1 "$file" 2>/dev/null \
            | sed 's/^\xef\xbb\xbf//' \
            | sed 's/^[[:space:]]*#\{1,6\}[[:space:]]*//' \
            | sed 's/^\*\*\(.*\)\*\*$/\1/' \
            | sed 's/^[[:space:]]*//')
          [ -z "$title" ] && title=$(basename "$file" .md)
          echo "$title"
        }

        echo "" >> index.md
        echo "### 📋 Core Documents" >> index.md
        echo "" >> index.md

        for file in "README.md" "docs/governance/README.md" "docs/ai-decision-timeline.md" "docs/deviations.md"; do
          if [ -f "$file" ]; then
            title=$(extract_title "$file")
            echo "- **[$title]($file)**" >> index.md
          fi
        done

        echo "" >> index.md
        echo "### 📚 Governance Rules & Prompts" >> index.md
        echo "" >> index.md

        # List all docs (governance, prompts, other), excluding files already listed in Core Documents
        find docs -type f -name "*.md" | sort | while read -r f; do
          case "$f" in
            "docs/governance/README.md"|"docs/ai-decision-timeline.md"|"docs/deviations.md") continue ;;
          esac
          title=$(extract_title "$f")
          echo "- **[$title]($f)**" >> index.md
        done

        echo "" >> index.md
        echo "---" >> index.md
        echo "" >> index.md
        echo "Last updated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> index.md
        echo "" >> index.md
        echo "**Note:** This index is auto-generated. Edit source files under module-playbook-example/docs/ to change the index." >> index.md
        echo "" >> index.md
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add module-playbook-example/index.md
        if git diff --staged --quiet; then
          echo "No changes to index.md"
        else
          git commit -m "Auto-update module-playbook-example/index.md [skip ci]"
          git pull --rebase origin "${{ github.head_ref || github.ref_name }}"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
